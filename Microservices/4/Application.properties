# ── API Gateway Configuration ─────────────────────────────────────────
server.port=9090
spring.application.name=api-gateway

# ── Eureka Client ─────────────────────────────────────────────────────
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# ── Spring Cloud Gateway – Service Discovery Locator ──────────────────
# enabled=true: Gateway auto-creates routes for every service registered
# in Eureka. No manual route config needed.
#
# URL pattern: http://localhost:9090/{service-name}/{original-path}
# Example: http://localhost:9090/account-service/accounts/123
#          → routed to http://localhost:8080/accounts/123
spring.cloud.gateway.discovery.locator.enabled=true

# lower-case-service-id=true: use lowercase service names in URLs
# Without this: http://localhost:9090/ACCOUNT-SERVICE/accounts/123
# With this   : http://localhost:9090/account-service/accounts/123
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# ── Actuator – expose gateway routes info ─────────────────────────────
management.endpoints.web.exposure.include=gateway,health,info
management.endpoint.gateway.enabled=true

# ── Logging ──────────────────────────────────────────────────────────
logging.level.com.cognizant.gateway=debug
logging.level.org.springframework.cloud.gateway=info
logging.level.org.springframework=info

# ── Loan Microservice Configuration ─────────────────────────────────
# doc2: "Include server.port property with value 8081"
# 8080 is already taken by account-service
server.port=8081
spring.application.name=loan-service

# ── Eureka Client ────────────────────────────────────────────────────
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# ── Logging ──────────────────────────────────────────────────────────
logging.level.com.cognizant.loan=debug
logging.level.org.springframework=info

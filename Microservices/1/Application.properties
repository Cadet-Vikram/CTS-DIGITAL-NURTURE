# ── Eureka Discovery Server Configuration ────────────────────────────
# doc2 MANDATORY: Eureka server runs on port 8761
server.port=8761
spring.application.name=eureka-server

# ── Eureka Server Settings ────────────────────────────────────────────
# register-with-eureka=false: the server itself does NOT register as a client
# fetch-registry=false: the server does NOT fetch registry from another server
# (These prevent the server from trying to register with itself)
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false

# ── Suppress noisy Eureka/Netflix logs ───────────────────────────────
logging.level.com.netflix.eureka=OFF
logging.level.com.netflix.discovery=OFF
logging.level.org.springframework=info

# ═══════════════════════════════════════════════════════════════
# Exercise 9: Application Properties – Library Management Boot
# ═══════════════════════════════════════════════════════════════

spring.application.name=LibraryManagement

# ── Server ───────────────────────────────────────────────────────
server.port=8080

# ── H2 In-Memory Database ─────────────────────────────────────────
# jdbc:h2:mem:librarydb  → named in-memory DB (lost on app restart)
spring.datasource.url=jdbc:h2:mem:librarydb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Web Console – accessible at http://localhost:8080/h2-console
# JDBC URL to enter in the console: jdbc:h2:mem:librarydb
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── JPA / Hibernate ───────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# update: creates/updates tables automatically based on entities
# use 'validate' or 'none' in production
spring.jpa.hibernate.ddl-auto=update

# Show SQL in console (useful for debugging; disable in production)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ── Logging ───────────────────────────────────────────────────────
logging.level.com.library=DEBUG
logging.level.org.springframework.web=INFO

# ═══════════════════════════════════════════════════════════════════
# orm-learn – Spring Data JPA + Hibernate Configuration
# ═══════════════════════════════════════════════════════════════════

spring.application.name=orm-learn

# ── Logging (as specified in hands-on 1) ─────────────────────────
logging.level.org.springframework=info
logging.level.com.cognizant=debug

# Hibernate SQL logs – shows every generated SELECT/INSERT/UPDATE
logging.level.org.hibernate.SQL=trace
logging.level.org.hibernate.type.descriptor.sql=trace

# Log pattern
logging.pattern.console=%d{dd-MM-yy} %d{HH:mm:ss.SSS} %-20.20thread %5p %-25.25logger{25} %25M %4L %m%n

# ── H2 In-Memory Database (used for GitHub / local dev) ──────────
spring.datasource.url=jdbc:h2:mem:ormlearn
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 web console: http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── MySQL (comment out H2 block above, uncomment this for MySQL) ──
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# spring.datasource.url=jdbc:mysql://localhost:3306/ormlearn
# spring.datasource.username=root
# spring.datasource.password=root
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ── JPA / Hibernate ──────────────────────────────────────────────
# 'create' – drops and recreates all tables on every startup
# 'validate' – use with MySQL when tables already exist
# 'update'   – adds new columns / tables but never drops
spring.jpa.hibernate.ddl-auto=create

# Show SQL queries formatted in the logs
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# IMPORTANT: must be true so data.sql runs AFTER Hibernate creates tables
spring.jpa.defer-datasource-initialization=true

# Allow data.sql to run for embedded databases
spring.sql.init.mode=always

# Server port
server.port=8080
